# ============================================================
# Nginx Configuration — sahayai.synthomind.cloud
# Place this file at: /etc/nginx/sites-available/sahayai.synthomind.cloud
# Then symlink:  sudo ln -s /etc/nginx/sites-available/sahayai.synthomind.cloud \
#                           /etc/nginx/sites-enabled/
# ============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sahayai.synthomind.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sahayai.synthomind.cloud;

    # ── SSL (Certbot will fill these in / uncomment after running certbot) ──
    ssl_certificate     /etc/letsencrypt/live/sahayai.synthomind.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sahayai.synthomind.cloud/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── React frontend (static build) ───────────────────────────────────────
    root /var/www/sahayai/frontend/build;
    index index.html;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Backend API — proxy to Node.js on port 5000 ─────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Upload size limit (for document uploads)
        client_max_body_size 20M;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Python prediction microservice — proxied at /api/predict ────────────
    # (Already handled by Node.js /api/ai routes which forward to port 5001)
    # If you want to expose it directly, uncomment below:
    # location /predict/ {
    #     proxy_pass http://127.0.0.1:5001/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # ── React Router — serve index.html for all non-API, non-static routes ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny access to hidden files (.env, .git, etc.) ──────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/sahayai.access.log;
    error_log  /var/log/nginx/sahayai.error.log warn;
}
